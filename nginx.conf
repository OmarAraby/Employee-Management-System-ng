# EMS Angular client — SPA serving + same-origin /api reverse proxy.
# The relative apiUrl ('/api', see AgDR-0001) depends on this proxy existing
# in every production deployment.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + uploaded static files (both live under /api on the backend)
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;   # signature/image uploads
    }

    # SPA fallback — Angular router owns all other paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
